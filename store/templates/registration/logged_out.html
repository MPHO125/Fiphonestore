{% extends 'store/base.html' %}

{% block title %}Logged Out - iPhone Store{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body py-5">
                    <div class="mb-4">
                        <i class="fas fa-sign-out-alt fa-4x text-primary"></i>
                    </div>
                    <h3 class="card-title mb-3">You have been logged out</h3>
                    <p class="text-muted mb-4">Thank you for shopping at iPhone Store!</p>
                    
                    <div class="d-grid gap-2">
                        <a href="{% url 'store:login' %}" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In Again
                        </a>
                        <a href="{% url 'store:home' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-home me-2"></i>Return to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.card {
    border: none;
    border-radius: 15px;
}

.btn-primary {
    background: linear-gradient(45deg, #667eea, #764ba2);
    border: none;
    border-radius: 25px;
    padding: 12px 30px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.btn-primary:hover {
    background: linear-gradient(45deg, #5a6fd8, #6a4190);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}
</style>
{% endblock %}
