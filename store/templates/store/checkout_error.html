{% extends 'store/base.html' %}

{% block title %}Checkout Error - iPhone Store{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card bg-dark text-white border-danger">
                <div class="card-header bg-danger">
                    <h4 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Checkout Error</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-danger">
                        <strong>Error:</strong> {{ error_message }}
                    </div>
                    
                    <h6 class="text-muted mt-4">Technical Details:</h6>
                    <pre class="bg-secondary text-white p-3 rounded" style="font-size: 0.8rem; max-height: 400px; overflow-y: auto;"><code>{{ traceback }}</code></pre>
                    
                    <div class="mt-4">
                        <a href="{% url 'store:cart' %}" class="btn btn-outline-light">
                            <i class="fas fa-arrow-left me-2"></i>Back to Cart
                        </a>
                        <button onclick="location.reload()" class="btn btn-primary ms-2">
                            <i class="fas fa-sync-alt me-2"></i>Try Again
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
